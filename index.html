<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CoverEdge Live Match</title>

<style>
    body {
        background: #000;
        color: white;
        text-align: center;
        font-family: Arial, sans-serif;
        padding: 0;
        margin: 0;
    }

    h1 {
        margin-top: 40px;
        color: #00e5ff;
        font-size: 40px;
        font-weight: bold;
    }

    /* Video Player Container Styling */
    .video-container {
        max-width: 90%;
        margin: 20px auto;
        /* Initially hidden */
        display: none; 
    }
    
    /* Ensure the video takes full width of its container */
    #liveVideo {
        width: 100%;
        height: auto;
        border: 2px solid #00e5ff;
        background: #111;
    }

    /* Popup box styling */
    .popup {
        display: flex; /* Use flexbox to center content */
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95); /* Semi-transparent overlay */
        z-index: 9999;
    }

    .popup-content {
        background: #222;
        padding: 30px;
        width: 80%;
        max-width: 350px;
        border-radius: 12px;
        box-shadow: 0px 0px 30px #00e5ff;
    }

    .popup h2 {
        font-size: 24px;
        margin-bottom: 15px;
        color: #00e5ff;
    }

    .popup p {
        font-size: 18px;
        margin-bottom: 25px;
    }

    .btn {
        background: #00e676;
        padding: 12px 20px;
        color: black;
        font-weight: bold;
        text-decoration: none;
        border-radius: 8px;
        display: inline-block;
        margin: 8px; /* Added margin for spacing between buttons */
        cursor: pointer;
        transition: background-color 0.2s;
    }

    .btn:hover {
        background: #00c853;
    }

    /* Style for the secondary "Already Joined" button */
    .btn.secondary {
        background: #444; /* Darker, less prominent color */
        color: white;
    }

    .btn.secondary:hover {
        background: #555;
    }

    .link {
        margin-top: 30px;
        font-size: 20px;
        font-weight: bold;
        color: #00ff90;
        margin-bottom: 20px;
    }
</style>

<script>
    // 📢 NEW STREAMING URL HAS BEEN UPDATED HERE
    const STREAM_URL = "https://foxenglish.pages.dev/playlist.m3u8";

    function startVideo() {
        // 1. Hide the popup
        document.getElementById('popupContainer').style.display = 'none';

        // 2. Show the video container
        document.getElementById('videoArea').style.display = 'block';

        // 3. Set the stream source and attempt to play
        const videoElement = document.getElementById('liveVideo');
        
        // Check if the browser natively supports HLS (M3U8)
        if (videoElement.canPlayType('application/vnd.apple.mpegurl') || videoElement.canPlayType('application/x-mpegurl')) {
            videoElement.src = STREAM_URL;
        } 
        
        // Note: For full cross-browser compatibility, especially on non-Apple devices, 
        // you would typically integrate a library like HLS.js here. 
        // For simplicity, we stick to native support in this example.

        videoElement.load();
        // Try to start playback (it might require a user gesture on some browsers)
        videoElement.play().catch(error => {
            console.warn("Autoplay failed:", error);
            // Inform user to click play manually if autoplay fails
            // You can add an overlay here instructing the user to tap to play
        });
    }
</script>

</head>
<body>

<h1>CoverEdge Live Match</h1>

<div class="video-container" id="videoArea">
    <video id="liveVideo" controls autoplay muted poster="" preload="auto">
        Your browser does not support the video tag.
    </video>
</div>

<div class="popup" id="popupContainer">
    <div class="popup-content">
        <h2>Join CoverEdge on Telegram</h2>
        <p>Subscribe for Live Match Clips, Rare Clips & More!</p>

        <a class="btn" href="https://t.me/CoverEdge45" target="_blank" onclick="startVideo();">JOIN NOW</a>
        
        <button class="btn secondary" onclick="startVideo();">Already Joined</button>
    </div>
</div>

<p class="link">
    <a href="https://t.me/CoverEdge45" target="_blank" style="color:#00ff90; text-decoration:none;">
        t.me/CoverEdge45
    </a>
</p>

</body>
</html>
